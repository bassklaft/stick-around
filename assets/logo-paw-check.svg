<?xml version="1.0" encoding="UTF-8"?>
<!--
  FloofLife brand mark — paw + green check on cream. Geometry is
  the canonical PawIcon (src/components/PawIcon.js): a custom
  5-shape paw silhouette matching the user-approved reference
  (cartoon paw, 4 toe ellipses + 1 heel path).

  Same silhouette used by the in-app PawgressPaw, Logo header,
  tab bar, and pet-photo placeholders — no drift between surfaces.

  Single-level (g transform="translate scale") (NOT nested svg)
  because macOS Quick Look's SVG renderer (qlmanage) silently
  ignores nested SVG viewBoxes.

  Re-export PNGs (do not write the dash-dash flag inline here, it
  breaks XML comment parsing in CoreSVG):
    qlmanage -t -s 1024 -o . logo-paw-check.svg
    sips -Z 512 logo-paw-check@1024.png  -o logo-paw-check@512.png
    sips -Z 256 logo-paw-check@1024.png  -o logo-paw-check@256.png
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" width="320" height="280">
  <!-- Cream background, rounded card -->
  <rect width="320" height="280" rx="24" fill="#FBE4DC"/>

  <!-- Paw — 24×24 native geometry scaled into a 200×200 region.
       scale 8.333 = 200 / 24. Translate (60, 40) lands the paw's
       0,0 origin at the canvas's top-left of the 200×200 region. -->
  <g transform="translate(60 40) scale(8.333)" fill="#C04A2C">
    <!-- food (inner-left toe) -->
    <ellipse cx="9.2"  cy="6"   rx="2.3" ry="3.4" transform="rotate(-6 9.2 6)"/>
    <!-- mind (inner-right toe) -->
    <ellipse cx="14.8" cy="6"   rx="2.3" ry="3.4" transform="rotate(6 14.8 6)"/>
    <!-- movement (outer-left toe) -->
    <ellipse cx="4.5"  cy="9.5" rx="2.0" ry="2.9" transform="rotate(-25 4.5 9.5)"/>
    <!-- body (outer-right toe) -->
    <ellipse cx="19.5" cy="9.5" rx="2.0" ry="2.9" transform="rotate(25 19.5 9.5)"/>
    <!-- special (heel) — direct trace of the locked reference. -->
    <path d="M 12 11.5 C 9.2 11.5 6.8 13.2 5.6 15.6 C 4.6 17.6 4.8 19.8 6 21.2 C 7.2 22.5 9.4 22.8 11 22.4 C 11.6 22.25 12.4 22.25 13 22.4 C 14.6 22.8 16.8 22.5 18 21.2 C 19.2 19.8 19.4 17.6 18.4 15.6 C 17.2 13.2 14.8 11.5 12 11.5 Z"/>
  </g>

  <!-- Green check badge — same anatomy as the in-app PawIcon's
       optional `withCheck`. Translated to land at the bottom-right
       of the paw silhouette. -->
  <g transform="translate(216 207)">
    <circle r="28" fill="#FBE4DC"/>
    <circle r="22.4" fill="#3F8E5C"/>
    <path d="M -10.5 0 L -2.1 8.4 L 12.6 -8.4" stroke="#fff" stroke-width="4.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
