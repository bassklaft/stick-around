<?xml version="1.0" encoding="UTF-8"?>
<!--
  FloofLife brand mark — paw + green check on cream. Geometry is
  the canonical PawIcon (src/components/PawIcon.js): 4 toes
  (PAW_TOES) + heel pad (PAW_HEEL_PATH), 100×100 user-space. Same
  silhouette used by the in-app PawgressPaw, Logo header, and tab
  bar — no drift between surfaces.

  Re-export PNGs:
    qlmanage -t -s 1024 -o . logo-paw-check.svg
    sips -Z 512 logo-paw-check@1024.png --out logo-paw-check@512.png
    sips -Z 256 logo-paw-check@1024.png --out logo-paw-check@256.png
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" width="320" height="280">
  <!-- Cream background, rounded card -->
  <rect width="320" height="280" rx="24" fill="#FBE4DC"/>

  <!-- Paw — PawIcon's 100×100 viewBox translated and scaled into
       the 320×280 canvas. Translate (60, 40), scale 2.0 → paw
       fills a centered 200×200 region. -->
  <g transform="translate(60 40) scale(2)" fill="#C04A2C">
    <!-- Toes (PAW_TOES) -->
    <ellipse cx="22" cy="33" rx="8" ry="14" transform="rotate(-22 22 33)"/>
    <ellipse cx="41" cy="22" rx="8" ry="14" transform="rotate(-6 41 22)"/>
    <ellipse cx="59" cy="22" rx="8" ry="14" transform="rotate(6 59 22)"/>
    <ellipse cx="78" cy="33" rx="8" ry="14" transform="rotate(22 78 33)"/>
    <!-- Heel (PAW_HEEL_PATH) -->
    <path d="M 22 58 C 14 58 10 70 14 80 C 18 92 32 96 50 96 C 68 96 82 92 86 80 C 90 70 86 58 78 58 L 22 58 Z"/>
  </g>

  <!-- Green check badge — same anatomy as the in-app PawIcon's
       optional `withCheck`. Translated to land at the bottom-right
       of the paw silhouette. -->
  <g transform="translate(216 200)">
    <circle r="28" fill="#FBE4DC"/>
    <circle r="22" fill="#3F8E5C"/>
    <path d="M -10 0 L -2 8 L 12 -8" stroke="#fff" stroke-width="4.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
